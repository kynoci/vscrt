version: 2
updates:
  # Node dependencies. Grouped so dev-only bumps don't flood the inbox
  # with individual PRs. Runtime deps (currently just @noble/hashes +
  # @vscode/codicons) land as separate PRs so crypto bumps are easy to
  # review in isolation.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # VS Code type defs follow the editor's release cadence; let a
      # human bump these intentionally with the corresponding engines.vscode.
      - dependency-name: "@types/vscode"
  # CLI sibling package has its own lockfile / dep graph.
  - package-ecosystem: npm
    directory: /cli
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - cli
  # GitHub Actions workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
